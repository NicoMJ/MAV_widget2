# GCS streaming to Wi-Fi AP clients (installed to /etc/default/gcs-ap-streaming)
# AP subnet: 192.168.54.0/24, gateway 192.168.54.1

AP_IP=192.168.54.1
AP_BCAST=192.168.54.255

# MAVLink (MAVProxy)
MAV_AP_BCAST_PORT=14550
MAV_AP_IN_PORT=14550

# Video RTSP (ffmpeg listens on AP_IP)
RTSP_PORT=8554
RTSP_PATH=/stream

# Video source: udp (companion / QGC-style H.264 UDP), v4l2, or test
VIDEO_MODE=udp
# ffmpeg reads relay copy (QGC on GCS keeps 0.0.0.0:5600)
VIDEO_UDP_PORT=5601
VIDEO_UDP_BIND=127.0.0.1
VIDEO_IFACE=eth0
VIDEO_FWD_PORT=5601
# Optional: prefer this NetworkManager profile for wlan0 (any profile works if unset).
# Example: GCS_WLAN_CONNECTION=Coco
GCS_WLAN_CONNECTION=
VIDEO_DEVICE=/dev/video0
VIDEO_V4L2_SIZE=1280x720
VIDEO_V4L2_FPS=30
