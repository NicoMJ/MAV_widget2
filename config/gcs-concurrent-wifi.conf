# NetworkManager — concurrent STA+AP (single radio, e.g. MT7921).
# NM bg-scan-period is not supported in NM 1.36 (logs "unknown key").
# bgscan is disabled per-connection via wpa_cli after connect (wlan-concurrent.sh).
# mac address randomisation off — avoids reconnect loops on some drivers.
[wifi]
scan-rand-mac-address=no
